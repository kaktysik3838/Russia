<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Чат-рулетка</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; text-align: center; padding: 20px; }
        .video-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        video { width: 100%; max-width: 400px; background: #000; border-radius: 8px; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; }
        #startBtn { background: #28a745; color: white; }
        #unmuteBtn { background: #007bff; color: white; }
        #status { margin: 20px; color: #ffc107; font-size: 18px; }
    </style>
</head>
<body>

    <h1>P2P Видеочат</h1>
    <div id="status">Нажмите «Войти в чат», чтобы начать</div>

    <div class="video-container">
        <div><h3>Вы</h3><video id="localVideo" autoplay playsinline muted></video></div>
        <div><h3>Собеседник</h3><video id="remoteVideo" autoplay playsinline muted></video></div>
    </div>

    <div class="controls">
        <button id="startBtn">Войти в чат</button>
        <button id="unmuteBtn" disabled>Включить звук собеседника</button>
    </div>

    <script>
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const startBtn = document.getElementById('startBtn');
        const unmuteBtn = document.getElementById('unmuteBtn');
        const statusText = document.getElementById('status');

        let localStream, peerConnection, socket;
        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        // Включение звука
        unmuteBtn.addEventListener('click', () => {
            remoteVideo.muted = !remoteVideo.muted;
            unmuteBtn.textContent = remoteVideo.muted ? 'Включить звук собеседника' : 'Звук включен 🔊';
        });

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            statusText.textContent = 'Разрешите доступ к камере...';
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                
                // Автоматически определяем адрес сервера (ws:// для локалки, wss:// для Render)
                const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
                socket = new WebSocket(protocol + window.location.host);
                
                setupSignaling();
            } catch (err) {
                statusText.textContent = 'Ошибка доступа к камере.';
                startBtn.disabled = false;
            }
        });

        function setupSignaling() {
            socket.onmessage = async (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'status') {
                    statusText.textContent = data.message;
                }

                if (data.type === 'initiate') {
                    createPeerConnection();
                    const offer = await peerConnection.createOffer();
                    await peerConnection.setLocalDescription(offer);
                    socket.send(JSON.stringify({ type: 'offer', offer }));
                }

                if (data.type === 'offer') {
                    createPeerConnection();
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    socket.send(JSON.stringify({ type: 'answer', answer }));
                }

                if (data.type === 'answer') {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                }

                if (data.type === 'candidate') {
                    if (peerConnection) {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    }
                }
            };
        }

        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
                unmuteBtn.disabled = false;
                statusText.textContent = 'Вы на связи с собеседником!';
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.send(JSON.stringify({ type: 'candidate', candidate: event.candidate }));
                }
            };
        }
    </script>
</body>
</html>
