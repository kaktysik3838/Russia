<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Чат-рулетка</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .video-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }
        .video-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        video {
            width: 100%;
            max-width: 480px;
            background-color: #000;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        h3 { margin-bottom: 10px; }
        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        #startBtn { background-color: #28a745; color: white; }
        #startBtn:hover { background-color: #218838; }
        
        #unmuteBtn { background-color: #007bff; color: white; }
        #unmuteBtn:hover { background-color: #0069d9; }
        #unmuteBtn:disabled { background-color: #555; cursor: not-allowed; color: #888; }
        
        #status { margin-top: 20px; font-size: 18px; color: #ffc107; }
    </style>
</head>
<body>

    <h1>Анонимный P2P Видеочат</h1>
    <div id="status">Нажмите «Начать поиск», чтобы разрешить доступ к камере</div>

    <div class="video-container">
        <div class="video-box">
            <h3>Вы</h3>
            <!-- Локальное видео всегда muted, чтобы вы не слышали сами себя -->
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-box">
            <h3>Собеседник</h3>
            <!-- Видео собеседника запускается muted для обхода блокировки автоплея -->
            <video id="remoteVideo" autoplay playsinline muted></video>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">Начать поиск</button>
        <!-- Кнопка включения звука собеседнику -->
        <button id="unmuteBtn" disabled>Включить звук собеседника</button>
    </div>

    <script>
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const startBtn = document.getElementById('startBtn');
        const unmuteBtn = document.getElementById('unmuteBtn');
        const statusText = document.getElementById('status');

        let localStream;
        let peerConnection;

        // Бесплатные STUN-серверы Google для пробития NAT
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' }
            ]
        };

        // --- Управление звуком собеседника ---
        unmuteBtn.addEventListener('click', () => {
            if (remoteVideo.muted) {
                remoteVideo.muted = false;
                unmuteBtn.textContent = 'Звук включен 🔊';
                unmuteBtn.style.backgroundColor = '#28a745';
            } else {
                remoteVideo.muted = true;
                unmuteBtn.textContent = 'Включить звук собеседника 🔈';
                unmuteBtn.style.backgroundColor = '#007bff';
            }
        });

        // --- Инициализация камеры и WebRTC ---
        startBtn.addEventListener('click', async () => {
            try {
                statusText.textContent = 'Запрашиваем доступ к камере...';
                
                // Запрашиваем видео и аудио у пользователя
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                
                statusText.textContent = 'Ожидание подключения к сигнальному серверу...';
                startBtn.disabled = true;

                initWebRTC();

            } catch (err) {
                console.error('Ошибка доступа к медиаустройствам.', err);
                statusText.textContent = 'Ошибка: нет доступа к камере или микрофону.';
            }
        });

        function initWebRTC() {
            peerConnection = new RTCPeerConnection(configuration);

            // Добавляем наши локальные треки (видео/аудио) в соединение
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            // Когда получаем треки от собеседника, выводим их в remoteVideo
            peerConnection.ontrack = event => {
                if (!remoteVideo.srcObject) {
                    remoteVideo.srcObject = event.streams[0];
                    statusText.textContent = 'Собеседник найден! Соединение установлено.';
                    // Активируем кнопку включения звука, так как поток пошел
                    unmuteBtn.disabled = false;
                }
            };

            // Сбор ICE-кандидатов (маршрутов связи)
            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    // ОТПРАВИТЬ event.candidate НА СИГНАЛЬНЫЙ СЕРВЕР
                    // signalingServer.send({ type: 'candidate', candidate: event.candidate });
                }
            };

            /* 
            ===============================================================
            ВНИМАНИЕ: ЗДЕСЬ НУЖНА ЛОГИКА СИГНАЛЬНОГО СЕРВЕРА (WebSocket)
            ===============================================================
            Чтобы два браузера соединились напрямую по P2P, им нужно обменяться 
            SDP-офферами (Offer) и ответами (Answer) через сторонний сервер.
            
            Примерная логика:
            
            1. Мы создаем Offer и отправляем на сервер:
               const offer = await peerConnection.createOffer();
               await peerConnection.setLocalDescription(offer);
               socket.send(JSON.stringify({ type: 'offer', offer: offer }));

            2. Когда получаем Offer от собеседника через сервер:
               await peerConnection.setRemoteDescription(new RTCSessionDescription(receivedOffer));
               const answer = await peerConnection.createAnswer();
               await peerConnection.setLocalDescription(answer);
               socket.send(JSON.stringify({ type: 'answer', answer: answer }));

            3. Когда получаем Answer:
               await peerConnection.setRemoteDescription(new RTCSessionDescription(receivedAnswer));
               
            4. Когда получаем ICE-кандидатов:
               await peerConnection.addIceCandidate(new RTCIceCandidate(receivedCandidate));
            */
        }
    </script>
</body>
</html>
